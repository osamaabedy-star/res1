<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدارس رياض الإبداع | تسجيل الصف الأول الابتدائي 1448هـ</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Tajawal -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- moment و moment-hijri للتحويل الدقيق -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-hijri/2.1.2/moment-hijri.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f1f6fa 0%, #dee8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .main-card {
            max-width: 900px;
            width: 100%;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(4px);
            border-radius: 40px 40px 30px 30px;
            box-shadow: 0 25px 40px -15px #0b2d4680;
            overflow: hidden;
        }

        .gold-strip {
            height: 8px;
            background: linear-gradient(90deg, #ffb347, #ffdd99, #ffb347);
        }

        .header {
            background: linear-gradient(145deg, #0a3a55, #164b6b);
            color: white;
            padding: 15px 25px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            width: 90px;
            height: 90px;
            border-radius: 15px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            border: 2px solid #ffb347;
        }

        .logo-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text h1 {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .logo-text h1 span {
            color: #ffb347;
        }

        .logo-text p {
            font-size: 0.9rem;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .contact-info {
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 18px;
            border: 1px solid #ffb34760;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-info i {
            color: #ffb347;
            font-size: 1.3rem;
        }

        .contact-info a {
            color: white;
            text-decoration: none;
            direction: ltr;
            background: #ffb34730;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
        }

        .contact-info a:hover {
            background: #ffb347;
            color: #0a3a55;
        }

        .content {
            padding: 25px 30px;
        }

        .register-panel {
            background: #ffffffd9;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 8px 18px #1b3b4f20;
            border: 1px solid #e6f0f8;
            margin-bottom: 20px;
        }

        .register-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .register-header .icon {
            background: #0a3a55;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .register-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0a3a55;
        }

        .register-header h2 small {
            font-size: 0.85rem;
            color: #4d748b;
            display: block;
        }

        .date-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #edf4fa;
            padding: 5px;
            border-radius: 50px;
            width: fit-content;
        }

        .date-tab {
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #195072;
            transition: 0.2s;
        }

        .date-tab.active {
            background: #0a3a55;
            color: white;
        }

        .date-input-container.hidden {
            display: none;
        }

        .miladi-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
        }

        .miladi-group label {
            font-weight: 600;
            color: #195072;
            min-width: 100px;
            font-size: 1rem;
        }

        .miladi-group input[type="date"] {
            flex: 2;
            padding: 12px 18px;
            border: 2px solid #bed5e8;
            border-radius: 50px;
            font-size: 1rem;
            background: white;
            min-width: 250px;
            outline: none;
        }

        .miladi-group input[type="date"]:focus {
            border-color: #ffb347;
        }

        .hijri-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
        }

        .hijri-fields {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex: 2;
        }

        .hijri-fields input {
            padding: 10px 12px;
            border: 2px solid #bed5e8;
            border-radius: 50px;
            font-size: 0.95rem;
            text-align: center;
            min-width: 80px;
            flex: 1;
            outline: none;
        }

        .hijri-fields input:focus {
            border-color: #ffb347;
        }

        .check-btn {
            background: #0a3a55;
            border: none;
            color: white;
            padding: 14px 35px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            border: 2px solid #ffffff70;
            transition: 0.2s;
            box-shadow: 0 8px 15px #0a3a5570;
        }

        .check-btn:hover {
            background: #0b2f44;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px #0a3a55;
        }

        .footer {
            background: #d2e2ef;
            padding: 15px 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-top: 3px solid #ffb347;
            font-size: 1rem;
            font-weight: 600;
            color: #0a3a55;
        }

        .footer .phone-number {
            direction: ltr;
            background: white;
            padding: 8px 25px;
            border-radius: 60px;
            box-shadow: 0 4px 0 #b0c8da;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer .phone-number i {
            color: #25d366;
            font-size: 1.4rem;
        }

        .footer .phone-number a {
            color: #0a3a55;
            text-decoration: none;
            font-weight: 700;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #25d366;
            color: white;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 10px 20px #25d36680;
            z-index: 99;
            border: 4px solid white;
            text-decoration: none;
            transition: 0.2s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            background: #20b859;
        }

        /* النافذة المنبثقة (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 50px;
            width: 90%;
            max-width: 550px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 30px 50px #00000060;
            border: 5px solid #ffb347;
            position: relative;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            left: 20px;
            background: #f0f0f0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            border: none;
            color: #333;
            transition: 0.2s;
        }

        .modal-close:hover {
            background: #ffb347;
            color: white;
        }

        .modal-level {
            background: #0a3a55;
            color: white;
            padding: 12px 25px;
            border-radius: 80px;
            font-size: 2rem;
            font-weight: 800;
            display: inline-block;
            margin: 15px 0 20px;
            border: 3px solid #ffb347;
        }

        .modal-message {
            font-size: 1.2rem;
            color: #154256;
            margin: 15px 0;
            background: #f5faff;
            padding: 20px;
            border-radius: 40px;
            line-height: 1.6;
        }

        .modal-link {
            margin: 20px 0 10px;
        }

        .modal-link a {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: #ffb347;
            color: #0a3a55;
            font-weight: 800;
            font-size: 1.4rem;
            padding: 15px 40px;
            border-radius: 80px;
            text-decoration: none;
            border: 3px solid white;
            box-shadow: 0 8px 0 #b17f2e;
            transition: 0.1s;
        }

        .modal-link a:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 0 #b17f2e;
        }

        .modal-note {
            background: #e4f1f9;
            border-radius: 60px;
            padding: 10px 20px;
            color: #0a3a55;
            font-size: 1rem;
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- أيقونة واتساب عائمة (مكررة لكن بنفس الرقم) -->
    <a href="https://wa.me/966554213311" class="whatsapp-float" target="_blank" title="تواصل معنا عبر الواتساب">
        <i class="fab fa-whatsapp"></i>
    </a>

    <div class="main-card">
        <div class="gold-strip"></div>
        <!-- الهيدر مع الشعار -->
        <div class="header">
            <div class="logo">
                <div class="logo-img">
                    <img src="https://www.wzufa.com/wp-content/uploads/2022/07/Riyadh-Al-Ebdaa-Schools.png" alt="شعار مدارس رياض الإبداع" onerror="this.onerror=null; this.src=''; this.parentElement.innerHTML='<i class=\'fas fa-lightbulb\' style=\'font-size:2.5rem;color:#0a3a55;\'></i>';">
                </div>
                <div class="logo-text">
                    <h1>مدارس <span>رياض الإبداع</span></h1>
              
                </div>
            </div>
           
        </div>

        <div class="content">
            <!-- بطاقة إدخال التاريخ -->
            <div class="register-panel">
                <div class="register-header">
                    <div class="icon"><i class="fas fa-calendar-alt"></i></div>
                    <h2>تحديد المرحلة الدراسية <small>أدخل تاريخ ميلاد الطفل</small></h2>
                </div>

                <!-- اختيار نوع التاريخ -->
                <div class="date-tabs">
                    <button class="date-tab active" id="tabMiladi">التاريخ الميلادي </button>
                    <button class="date-tab" id="tabHijri">التاريخ الهجري</button>
                </div>

                <!-- حقل الميلادي -->
                <div id="miladiInput" class="date-input-container">
                    <div class="miladi-group">
                        <label><i class="far fa-calendar"></i> تاريخ الميلاد:</label>
                        <input type="date" id="miladiDate" min="2015-01-01" max="2024-12-31">
                    </div>
                </div>

                <!-- حقل الهجري -->
                <div id="hijriInput" class="date-input-container hidden">
                    <div class="hijri-group">
                        <label><i class="fas fa-moon"></i> التاريخ الهجري:</label>
                        <div class="hijri-fields">
                            <input type="number" id="hijriDay" placeholder="اليوم" min="1" max="30">
                            <input type="number" id="hijriMonth" placeholder="الشهر" min="1" max="12">
                            <input type="number" id="hijriYear" placeholder="السنة" min="1400" max="1450">
                        </div>
                    </div>
                </div>

                <button class="check-btn" id="checkBtn"><i class="fas fa-search"></i> تحقق من المرحلة</button>
            </div>
        </div>

        <!-- الفوتر (بدون بريد إلكتروني) -->
        <div class="footer">
            <span><i class="fas fa-map-pin"></i> حي الملك عبدالعزيز - شارع الملك خالد</span>
            <span class="phone-number"><i class="fab fa-whatsapp"></i> <a href="https://wa.me/966554213311" target="_blank">+966 55 421 3311</a></span>
        </div>
    </div>

    <!-- النافذة المنبثقة (Modal) -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
            <div class="modal-level" id="modalLevel">الصف الأول الابتدائي</div>
            <div class="modal-message" id="modalMessage"></div>
            <div class="modal-link" id="modalLinkContainer"></div>
            <div class="modal-note" id="modalNote"></div>
        </div>
    </div>

    <script>
        (function() {
            // عناصر التبويب
            const tabMiladi = document.getElementById('tabMiladi');
            const tabHijri = document.getElementById('tabHijri');
            const miladiInputDiv = document.getElementById('miladiInput');
            const hijriInputDiv = document.getElementById('hijriInput');

            // حقول الإدخال
            const miladiDate = document.getElementById('miladiDate');
            const hijriDay = document.getElementById('hijriDay');
            const hijriMonth = document.getElementById('hijriMonth');
            const hijriYear = document.getElementById('hijriYear');

            // الأزرار
            const checkBtn = document.getElementById('checkBtn');

            // عناصر المودال
            const modal = document.getElementById('resultModal');
            const closeModal = document.getElementById('closeModal');
            const modalLevel = document.getElementById('modalLevel');
            const modalMessage = document.getElementById('modalMessage');
            const modalLinkContainer = document.getElementById('modalLinkContainer');
            const modalNote = document.getElementById('modalNote');

            // الرابط
            const GRADE1_LINK = "https://forms.gle/XSFhEaUk9vcN5FnY7";

            // تواريخ القطع الميلادية
            const CUTOFF_GRADE1_FIRST = moment('2020-08-24'); // 24 أغسطس 2020
            const CUTOFF_GRADE1_SECOND_START = moment('2020-08-25');
            const CUTOFF_GRADE1_SECOND_END = moment('2020-11-22');
            const CUTOFF_KG3_END = moment('2021-08-24');
            const CUTOFF_KG2_END = moment('2022-08-24');
            const CUTOFF_KG1_END = moment('2023-08-24');

            // أحداث التبويب
            tabMiladi.addEventListener('click', function() {
                tabMiladi.classList.add('active');
                tabHijri.classList.remove('active');
                miladiInputDiv.classList.remove('hidden');
                hijriInputDiv.classList.add('hidden');
            });

            tabHijri.addEventListener('click', function() {
                tabHijri.classList.add('active');
                tabMiladi.classList.remove('active');
                hijriInputDiv.classList.remove('hidden');
                miladiInputDiv.classList.add('hidden');
            });

            // دالة تحويل هجري إلى ميلادي
            function hijriToMiladi(day, month, year) {
                if (!day || !month || !year) return null;
                const hijriMoment = moment(`${year}-${month}-${day}`, 'iYYYY-iM-iD');
                return hijriMoment.isValid() ? hijriMoment : null;
            }

            // فتح المودال وعرض النتيجة
            function showModal(level, message, note, showLink) {
                modalLevel.textContent = level;
                modalMessage.innerHTML = `<i class="fas fa-info-circle" style="margin-left: 10px; color:#ffb347;"></i>${message}`;
                modalNote.innerHTML = `<i class="fas fa-info-circle"></i> ${note}`;

                if (showLink) {
                    modalLinkContainer.innerHTML = `<a href="${GRADE1_LINK}" target="_blank" class="register-link-btn"><i class="fas fa-pencil-alt"></i> تسجيل طالب مستجد في مدارس رياض الابداع <i class="fas fa-arrow-left"></i></a>`;
                } else {
                    modalLinkContainer.innerHTML = '';
                }

                modal.style.display = 'flex';
            }

            // إغلاق المودال
            closeModal.addEventListener('click', function() {
                modal.style.display = 'none';
            });
            window.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });

            // التحقق عند الضغط على الزر
            function checkLevel() {
                let birthMoment = null;

                if (!miladiInputDiv.classList.contains('hidden')) {
                    // ميلادي
                    const dateStr = miladiDate.value;
                    if (!dateStr) {
                        alert('الرجاء إدخال التاريخ الميلادي');
                        return;
                    }
                    birthMoment = moment(dateStr);
                    if (!birthMoment.isValid()) {
                        alert('التاريخ الميلادي غير صحيح');
                        return;
                    }
                } else {
                    // هجري
                    const day = parseInt(hijriDay.value, 10);
                    const month = parseInt(hijriMonth.value, 10);
                    const year = parseInt(hijriYear.value, 10);
                    if (isNaN(day) || isNaN(month) || isNaN(year)) {
                        alert('الرجاء إدخال جميع الحقول الهجرية');
                        return;
                    }
                    birthMoment = hijriToMiladi(day, month, year);
                    if (!birthMoment) {
                        alert('التاريخ الهجري غير صحيح');
                        return;
                    }
                }

                // تحديد الفئة
                let levelText = '', infoMessage = '', note = '', showLink = false;

                if (birthMoment.isSameOrBefore(CUTOFF_GRADE1_FIRST)) {
                    levelText = 'الصف الأول الابتدائي (الفئة الأولى)';
                    infoMessage = '✅ الطفل أكمل 6 سنوات قبل 24 أغسطس 2026م، وهو مؤهل مباشرة للصف الأول الابتدائي.';
                    note = '✔️ لا يحتاج إلى شرط إضافي.';
                    showLink = true;
                }
                else if (birthMoment.isBetween(CUTOFF_GRADE1_SECOND_START, CUTOFF_GRADE1_SECOND_END, null, '[]')) {
                    levelText = 'الصف الأول الابتدائي (الفئة الثانية)';
                    infoMessage = '⚠️ الطفل لم يكمل 6 سنوات (بفارق أقصاه 90 يوماً). يجب تقديم ما يثبت دراسة سنة كاملة في رياض الأطفال.';
                    note = '✔️ يشترط دراسة سنة في رياض الأطفال (المستوى KG3).';
                    showLink = true;
                }
                else if (birthMoment.isAfter(CUTOFF_GRADE1_SECOND_END) && birthMoment.isSameOrBefore(CUTOFF_KG3_END)) {
                    levelText = 'مرحلة رياض الأطفال (KG3)';
                    infoMessage = '👧🏻👦🏻 الطفل في الفئة العمرية لـ KG3 (سيكون عمره 5 سنوات خلال العام).';
                    note = 'مدارس رياض الإبداع لا تضم حالياً أقساماً لرياض الأطفال.';
                    showLink = false;
                }
                else if (birthMoment.isAfter(CUTOFF_KG3_END) && birthMoment.isSameOrBefore(CUTOFF_KG2_END)) {
                    levelText = 'مرحلة رياض الأطفال (KG2)';
                    infoMessage = '🧸 الطفل في الفئة العمرية لـ KG2 (سيكون عمره 4 سنوات خلال العام).';
                    note = 'نأسف، لا يوجد روضة أطفال في مدارسنا حالياً.';
                    showLink = false;
                }
                else if (birthMoment.isAfter(CUTOFF_KG2_END) && birthMoment.isSameOrBefore(CUTOFF_KG1_END)) {
                    levelText = 'مرحلة رياض الأطفال (KG1)';
                    infoMessage = '🍼 الطفل في الفئة العمرية لـ KG1 (سيكون عمره 3 سنوات خلال العام).';
                    note = 'مدارس رياض الإبداع لا تضم روضة أطفال.';
                    showLink = false;
                }
                else if (birthMoment.isBefore('2015-01-01')) {
                    levelText = 'أكبر من السن النظامي';
                    infoMessage = '📌 عمر الطفل أكبر من السن النظامي للصف الأول الابتدائي، يرجى مراجعة المدرسة.';
                    note = 'يمكن التقديم بعد التنسيق مع الإدارة.';
                    showLink = true; // نعطيه رابط مع تنبيه
                }
                else {
                    levelText = 'أقل من السن المطلوب';
                    infoMessage = '🔸 عمر الطفل أقل من الحد الأدنى للقبول في الصف الأول الابتدائي ومرحلة رياض الأطفال.';
                    note = 'سيتم فتح التسجيل لاحقاً للفئات العمرية الأصغر.';
                    showLink = false;
                }

                // عرض المودال
                showModal(levelText, infoMessage, note, showLink);
            }

            checkBtn.addEventListener('click', checkLevel);

            // عند الضغط على Enter في أي حقل
            miladiDate.addEventListener('keypress', function(e) { if (e.key === 'Enter') checkLevel(); });
            hijriDay.addEventListener('keypress', function(e) { if (e.key === 'Enter') checkLevel(); });
            hijriMonth.addEventListener('keypress', function(e) { if (e.key === 'Enter') checkLevel(); });
            hijriYear.addEventListener('keypress', function(e) { if (e.key === 'Enter') checkLevel(); });

            // جعل الحقول فارغة في البداية
            miladiDate.value = '';
